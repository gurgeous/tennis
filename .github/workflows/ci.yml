name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{github.workflow}}-${{github.ref_name}}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix: { platform: [ubuntu-latest, macos-15, macos-latest, windows-latest] }
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v3
      - run: mise run ci
